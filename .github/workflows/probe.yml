name: Hourly provider probe

# Vercel Hobby cron allows 1×/day, so GitHub Actions is the hourly engine
# (unlimited minutes on public repos — spec §3).

on:
  schedule:
    - cron: "7 * * * *"
  workflow_dispatch:

concurrency:
  group: probe
  cancel-in-progress: false

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Probe all providers
        run: npm run probe
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DEMO_GROQ_KEY: ${{ secrets.DEMO_GROQ_KEY }}
          DEMO_GEMINI_KEY: ${{ secrets.DEMO_GEMINI_KEY }}
          DEMO_MISTRAL_KEY: ${{ secrets.DEMO_MISTRAL_KEY }}
          DEMO_OPENROUTER_KEY: ${{ secrets.DEMO_OPENROUTER_KEY }}
          DEMO_GITHUB_TOKEN: ${{ secrets.DEMO_GITHUB_TOKEN }}
      - name: Refresh status board (ISR on-demand revalidate)
        run: |
          curl -sf -X POST \
            "https://quotapilot.vercel.app/api/revalidate?secret=${{ secrets.REVALIDATE_SECRET }}"
